name: Generate TRMNL pages

on:
  schedule:
    # 3x per dag op wisselmoment begroeting (tijden in UTC, +1/+2 voor CET/CEST)
    - cron: '5 3 * * *'   # 04:05 wintertijd / 05:05 zomertijd → goedemorgen
    - cron: '5 10 * * *'  # 11:05 wintertijd / 12:05 zomertijd → goedemiddag
    - cron: '5 16 * * *'  # 17:05 wintertijd / 18:05 zomertijd → goedenavond
  workflow_dispatch: # Handmatig triggeren via GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate HTML pages
        run: python generate.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
